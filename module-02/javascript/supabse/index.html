<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Todo App</title>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f7fc;
        display: flex;
        justify-content: center;
        padding: 40px;
      }

      .container {
        width: 100%;
        max-width: 600px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .todo-input {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .todo-input input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
      }

      .todo-input button {
        padding: 12px 20px;
        border: none;
        background: #3b82f6;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      .todo-input button:hover {
        background: #2563eb;
      }

      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #fafafa;
      }

      .todo-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .todo-left span.completed {
        text-decoration: line-through;
        color: gray;
      }

      .actions {
        display: flex;
        gap: 15px;
      }

      .actions i {
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
      }

      .fa-pen {
        color: #f59e0b;
      }

      .fa-trash {
        color: #ef4444;
      }

      .actions i:hover {
        transform: scale(1.2);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📝 Todo App</h1>

      <div class="todo-input">
        <input type="text" id="todoInput" placeholder="Enter todo..." />
        <button onclick="addTodo()">Add</button>
      </div>

      <div id="todoList" class="todo-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
