<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random User Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Random User Generator</h1>

      <div class="card">
        <img
          id="userImg"
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhjM4-pmD0Rf1hBS5ck7QIMIdI9B-WpUz1mQ&s"
          alt="User Image"
        />

        <h2 id="userName">Loading...</h2>
        <p id="userEmail">Loading...</p>
        <p id="userCountry">Loading...</p>

        <button id="btn">Generate New User</button>
      </div>

      <p id="statusText"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
