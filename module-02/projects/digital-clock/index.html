<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <style> 
        .clock {
            font-size: 15rem;
            background-color: #444;
            color: wheat;
        }
    </style>
</head>
<body>
    
    <div class="clock">12:18:02</div>
    <h1>Stopwatch</h1>
    <div>
        <span id="hrs">00</span>
        <span>:</span>
        <span id="min">59</span>
        <span>:</span>
        <span id="sec">58</span>
        <span>.</span>
        <span id="ms">85</span>
    </div>

    <script src="./app.js"></script>
</body>
</html>
